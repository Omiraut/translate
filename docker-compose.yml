version: '3.8'

services:
  translation-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: translation-api
    ports:
      - "8000:8000"
    environment:
      - HOST=0.0.0.0
      - PORT=8000
      - RATE_LIMIT_REQUESTS=60
      - RATE_LIMIT_WINDOW_MINUTES=1
      - CACHE_TTL_MINUTES=60
      - CORS_ORIGINS=*
      - LOG_LEVEL=INFO
    volumes:
      - ./logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

  # Optional: Nginx reverse proxy
  nginx:
    image: nginx:alpine
    container_name: translation-api-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - translation-api
    restart: unless-stopped
    profiles:
      - with-nginx
